<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kakao DB Talk</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/models/blazeface"></script>
    <style>
        :root { --k-y: #FEE500; --k-b: #391B1B; --bg: #b2c7d9; }
        body { margin: 0; font-family: sans-serif; background: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 360px; height: 640px; background: white; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .page { display: none; flex-direction: column; height: calc(100% - 60px); }
        .active { display: flex; }
        #login-page { height: 100%; background: var(--k-y); justify-content: center; padding: 40px; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin-bottom: 5px; border: 1px solid #ddd; }
        .btn { width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer; }
        .header { padding: 15px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        #footer { height: 60px; display: none; justify-content: space-around; align-items: center; background: #f9f9f9; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div id="app">
    <div id="login-page" class="page active">
        <h2 style="text-align:center">KakaoTalk</h2>
        <input id="u" placeholder="아이디">
        <input id="p" type="password" placeholder="비밀번호">
        <button class="btn" style="background:var(--k-b); color:var(--k-y)" onclick="auth(false)">로그인</button>
        <button class="btn" style="background:none; border:1px solid #333; margin-top:5px" onclick="auth(true)">회원가입</button>
    </div>
    <div id="list-page" class="page">
        <div class="header"><span>친구</span><span onclick="addF()" style="cursor:pointer">+</span></div>
        <div id="req-box" style="background:#fff9c4"></div>
        <div id="f-list" style="flex:1; overflow-y:auto"></div>
    </div>
    <div id="chat-page" class="page">
        <div class="header" style="background:var(--bg)"><span onclick="showP('list-page')">←</span><span id="c-t"></span></div>
        <div id="c-box" style="flex:1; background:var(--bg); overflow-y:auto; padding:10px; display:flex; flex-direction:column"></div>
        <div style="display:flex; padding:10px"><input id="m-i" style="flex:1"> <button onclick="send()">전송</button></div>
    </div>
    <div id="footer">
        <div onclick="showP('list-page')" style="cursor:pointer">👤</div>
        <div onclick="logout()" style="cursor:pointer">🔄</div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let me = "", target = "";

    window.onload = () => {
        const u = localStorage.getItem('u'), p = localStorage.getItem('p');
        if(u && p) socket.emit('login', { username: u, password: p, isSignUp: false });
    };

    function auth(isSignUp) {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(!isSignUp) { localStorage.setItem('u', u); localStorage.setItem('p', p); }
        socket.emit('login', { username: u, password: p, isSignUp });
    }

    function logout() { localStorage.clear(); location.reload(); }

    socket.on('loginSuccess', u => { me = u; document.getElementById('footer').style.display='flex'; showP('list-page'); });
    socket.on('loginError', m => { alert(m); logout(); });
    socket.on('sysError', m => alert(m));

    function addF() { const t = prompt("아이디:"); if(t) socket.emit('sendFriendRequest', t); }

    socket.on('updateRequests', rs => {
        document.getElementById('req-box').innerHTML = rs.map(r => `
            <div style="padding:10px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between">
                ${r} <button onclick="socket.emit('respondRequest',{sender:'${r}',accept:true})">수락</button>
            </div>
        `).join('');
    });

    socket.on('updateFriends', fs => {
        document.getElementById('f-list').innerHTML = fs.map(f => `<div onclick="goChat('${f}')" style="padding:15px; border-bottom:1px solid #eee">👤 ${f}</div>`).join('');
    });

    function goChat(f) {
        target = f; document.getElementById('c-t').innerText = f;
        document.getElementById('c-box').innerHTML = '';
        showP('chat-page'); socket.emit('joinRoom', f);
    }

    function send() {
        const i = document.getElementById('m-i');
        socket.emit('sendMessage', { sender: me, receiver: target, text: i.value });
        i.value = '';
    }

    socket.on('receiveMessage', m => {
        const d = document.createElement('div');
        d.style = `padding:8px; margin:5px; border-radius:5px; max-width:70%; ${m.sender===me?'align-self:flex-end; background:var(--k-y)':'align-self:flex-start; background:white'}`;
        d.innerText = m.text;
        document.getElementById('c-box').appendChild(d);
    });

    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
