<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Secure Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/models/blazeface"></script>
    <style>
        :root { --k-y: #FEE500; --k-b: #391B1B; --bg: #b2c7d9; }
        body { margin: 0; font-family: sans-serif; background: #eee; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 360px; height: 100%; margin: 0 auto; background: white; position: relative; display: flex; flex-direction: column; }
        
        /* 보안 레이어: 최상위 우선순위 */
        #security-layer { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: black !important; z-index: 999999 !important; color: white; 
            flex-direction: column; justify-content: center; align-items: center; 
        }

        .page { display: none; flex-direction: column; height: calc(100% - 60px); width: 100%; }
        .active { display: flex; }
        #login-page { height: 100%; background: var(--k-y); justify-content: center; padding: 40px; box-sizing: border-box; }
        input, select { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .header { padding: 15px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; background: white; }
        #c-box { flex:1; background: var(--bg); overflow-y:auto; padding:10px; display:flex; flex-direction:column; }
        .msg { padding:8px 12px; margin:5px; border-radius:10px; max-width:75%; word-break:break-all; font-size: 14px; }
        .trans-text { font-size: 11px; color: #555; margin-top: 4px; border-top: 1px dashed #ccc; padding-top: 4px; }
        
        .trans-bar { padding: 8px; background: #f0f0f0; display: flex; align-items: center; gap: 8px; font-size: 11px; border-bottom: 1px solid #ddd; }
        #footer { height: 60px; display: none; justify-content: space-around; align-items: center; background: #f9f9f9; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div id="app">
    <!-- 보안 레이어 -->
    <div id="security-layer">
        <div style="font-size: 50px;">🔒</div>
        <div style="font-size: 20px; font-weight: bold; margin-top:20px;">보안 모드 작동 중</div>
        <p style="color: #888;">화면을 보고 있지 않습니다.</p>
    </div>
    
    <div id="login-page" class="page active">
        <h2 style="text-align:center;">Global AI Talk</h2>
        <input id="u" placeholder="아이디">
        <input id="p" type="password" placeholder="비밀번호">
        <button class="btn" style="background:var(--k-b); color:var(--k-y)" onclick="auth(false)">로그인</button>
        <button class="btn" style="background:none; border:1px solid #333; margin-top:5px" onclick="auth(true)">회원가입</button>
    </div>

    <div id="list-page" class="page">
        <div class="header"><span>친구 목록</span><span onclick="addF()" style="cursor:pointer; font-size: 20px;">+</span></div>
        <div id="req-box"></div>
        <div id="f-list" style="flex:1; overflow-y:auto"></div>
    </div>

    <div id="chat-page" class="page">
        <div class="header" style="background:var(--bg)"><span onclick="showP('list-page')">←</span><span id="c-t"></span><span></span></div>
        <div class="trans-bar">
            <strong>내가 보고 싶은 언어:</strong>
            <select id="my-lang" style="width:auto; padding:2px;">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="es">Español</option>
            </select>
        </div>
        <div id="c-box"></div>
        <div style="display:flex; padding:10px; background:white;">
            <input id="m-i" style="flex:1; margin:0" onkeypress="if(event.key==='Enter') send()" placeholder="메시지 입력...">
            <button onclick="send()" style="background:var(--k-y); border:none; padding:10px 15px; margin-left:5px; font-weight:bold;">전송</button>
        </div>
    </div>

    <div id="footer">
        <div onclick="showP('list-page')" style="cursor:pointer">👤</div>
        <div onclick="logout()" style="cursor:pointer">🔄</div>
    </div>

    <!-- 휴대폰 최적화: 1px로 실제 렌더링하여 브라우저 가속 유지 -->
    <video id="v" style="position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.1; pointer-events: none;" autoplay muted playsinline></video>
    <canvas id="c" style="display:none;"></canvas>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let me = "", target = "", model;

    function auth(isSignUp) {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(!u || !p) return;
        if(!isSignUp) { localStorage.setItem('u', u); localStorage.setItem('p', p); }
        socket.emit('login', { username: u, password: p, isSignUp });
    }

    window.onload = () => {
        const u = localStorage.getItem('u'), p = localStorage.getItem('p');
        if(u && p) socket.emit('login', { username: u, password: p, isSignUp: false });
    };

    function logout() { localStorage.clear(); location.reload(); }

    socket.on('loginSuccess', u => { 
        me = u; 
        document.getElementById('footer').style.display='flex'; 
        showP('list-page');
        initAI(); 
    });

    function addF() { const t = prompt("친구 아이디:"); if(t) socket.emit('sendFriendRequest', t); }
    socket.on('updateFriends', fs => {
        document.getElementById('f-list').innerHTML = fs.map(f => `<div onclick="goChat('${f}')" style="padding:15px; border-bottom:1px solid #eee; cursor:pointer;">👤 ${f}</div>`).join('');
    });

    socket.on('loadHistory', async history => {
        document.getElementById('c-box').innerHTML = '';
        for(let m of history) { await renderMsg(m); }
    });

    function goChat(f) {
        target = f; document.getElementById('c-t').innerText = f;
        showP('chat-page'); 
        socket.emit('joinRoom', f);
    }

    function send() {
        const i = document.getElementById('m-i');
        if(!i.value) return;
        socket.emit('sendMessage', { sender: me, receiver: target, text: i.value });
        i.value = '';
    }

    socket.on('receiveMessage', m => renderMsg(m));

    // 수신자 언어에 맞춰 번역 렌더링
    async function renderMsg(m) {
        const box = document.getElementById('c-box');
        const myLang = document.getElementById('my-lang').value;
        let translatedText = "";

        // 내가 보낸 게 아니거나, 수신 언어가 한국어가 아닐 때 번역 시도
        if (m.sender !== me || myLang !== 'ko') {
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(m.text)}&langpair=autodetect|${myLang}`);
                const data = await res.json();
                translatedText = data.responseData.translatedText;
            } catch(e) {}
        }

        const d = document.createElement('div');
        d.className = 'msg';
        d.style = `${m.sender===me ? 'align-self:flex-end; background:var(--k-y)' : 'align-self:flex-start; background:white; border:1px solid #ddd'}`;
        
        if (translatedText && translatedText.toLowerCase() !== m.text.toLowerCase()) {
            d.innerHTML = `<div>${m.text}</div><div class="trans-text">🌐 ${translatedText}</div>`;
        } else {
            d.innerText = m.text;
        }
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    function showP(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 휴대폰 동작 감지 패치
    async function initAI() {
        const v = document.getElementById('v');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const layer = document.getElementById('security-layer');

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 160 } }, 
                audio: false 
            });
            v.srcObject = stream;
            await v.play();
            model = await blazeface.load();

            async function detect() {
                if (v.readyState === v.HAVE_ENOUGH_DATA) {
                    canvas.width = 80; canvas.height = 60; // 초저해상도로 연산 속도 확보
                    ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                    const predictions = await model.estimateFaces(canvas, false);
                    
                    if (predictions.length === 0) {
                        layer.style.setProperty('display', 'flex', 'important');
                    } else {
                        layer.style.display = 'none';
                    }
                }
                setTimeout(detect, 300); // 0.3초마다 체크
            }
            detect();
        } catch(e) { console.error("AI 보안 에러:", e); }
    }
</script>
</body>
</html>
